version: '3.8'

services:
  # 1. Local Database: MongoDB
  mongo:
    image: mongo:latest
    container_name: mongodb-quiz
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: quiz_edu
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Database GUI: Mongo Express (Web UI for database administration)
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-quiz
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: adminpassword
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password123
    depends_on:
      - mongo

  # 3. Message Queue Backend: Redis
  redis:
    image: redis:alpine
    container_name: redis-quiz
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456
    volumes:
      - redis_data:/data

  # 4. Main Application Container
  quiz-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-app-container
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://admin:adminpassword@mongo:27017/quiz_edu?authSource=admin
      - JWT_SECRET=supersecretjwtkey_vpa_style_2026
      - JWT_REFRESH_SECRET=supersecretrefreshjwtkey_vpa_style_2026
      - GMAIL_USER=ndakiet1001@gmail.com
      - GMAIL_APP_PASSWORD=gvwftmyheblvwero
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
