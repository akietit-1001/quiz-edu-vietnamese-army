version: '3.8'

services:
  # 1. Local Database: MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb-quiz
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: quiz_edu
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Database GUI: Mongo Express (Web UI for database administration)
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-quiz
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: adminpassword
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password123
    depends_on:
      - mongodb

  # 3. Message Queue Backend: Redis
  redis:
    image: redis:alpine
    container_name: redis-quiz
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
